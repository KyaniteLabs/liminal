<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hydra Visual</title>
    <script src="https://unpkg.com/hydra-synth"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="hydra-canvas"></canvas>
    <script>
        const hydra = new Hydra({ canvas: document.getElementById('hydra-canvas') });
        

osc(3, 0.1, 0.5)
  .rotate(() => time * 0.3)
  .scale(0.8)
  .modulate(noise(10, 0.5))
  .color(0.3, 0.5, 0.8)
  .out(o0)

shape(4, 0.5)
  .scale(0.3)
  .rotate(() => -time * 0.5)
  .modulate(o0, 0.2)
  .color(1, 0.6, 0.3)
  .out()

src(o0)
  .scale(1.01)
  .rotate(0.02)
  .modulate(noise(2, 0.2))
  .blend(o0)
  .out()

gradient(0.3)
  .modulate(osc(5))
  .scrollX(() => time * 0.1)
  .scrollY(() => time * 0.15)
  .out()
    </script>
</body>
</html>
