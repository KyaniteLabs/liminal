name: Forgejo CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: liminal-forgejo-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: fast-gate
    # A gate that cannot fail is not a gate: steps here MUST hard-fail.
    # Bring-up problems get fixed at the cause (or reported), never silenced
    # with `|| true` / continue-on-error. (Reverted exactly that in 526071c4.)
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      ANTHROPIC_AUTH_TOKEN: ""
      ANTHROPIC_BASE_URL: ""
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ""
      ANTHROPIC_DEFAULT_OPUS_MODEL: ""
      ANTHROPIC_DEFAULT_SONNET_MODEL: ""
      MINIMAX_API_KEY: ""
      OLLAMA_API_KEY: ""
    steps:
      - name: Checkout
        # Use the Actions-provided context (token + server URL), which act_runner
        # always injects — instead of FORGEJO_TOKEN/FORGEJO_INTERNAL_URL, which were
        # never configured on the runner and made every run fail at checkout since
        # e0fc787e. The runner registered with (and can reach) the public URL.
        env:
          CHECKOUT_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          JOB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "${JOB_TOKEN:-}" ] || [ -z "${SERVER_URL:-}" ] || [ -z "${REPOSITORY:-}" ]; then
            echo "Actions checkout context (token/server URL/repository) is missing on the runner" >&2
            exit 1
          fi
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init .
          git remote add origin "${SERVER_URL}/${REPOSITORY}.git"
          GIT_CONFIG_COUNT=1 \
            GIT_CONFIG_KEY_0=http.extraHeader \
            GIT_CONFIG_VALUE_0="Authorization: token ${JOB_TOKEN}" \
            git fetch --no-tags --prune --depth=1 origin "$CHECKOUT_SHA"
          git checkout --detach FETCH_HEAD

      - name: Enable pnpm
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          corepack enable --install-directory "$HOME/.local/bin"
          corepack prepare pnpm@10.30.1 --activate

      - name: Verify toolchain
        run: |
          echo "Node: $(node --version)"
          echo "pnpm: $(pnpm --version)"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Orphan source check
        run: pnpm check:orphans

      - name: Package script target check
        run: pnpm check:script-targets

      - name: Lint source
        run: pnpm lint

      - name: Build workspace packages
        run: pnpm --filter @sinter/audio-core build

      - name: Build project
        run: pnpm build

      - name: Fast test suite
        run: pnpm test:ci:fast

      - name: Test quality check
        run: pnpm test:quality
