name: Gauntlet Ratchet
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gauntlet:
    name: Domain Gauntlet Ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Run Domain Ratchet
        run: pnpm domain:ratchet
