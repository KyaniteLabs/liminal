<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kinetic Typography</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  .scene {
    position: relative;
    width: 80vmin;
    height: 80vmin;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .threshold {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    box-shadow:
      0 0 20px #fff,
      0 0 40px #ff00de,
      0 0 60px #ff00de,
      inset 0 0 20px rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    z-index: 10;
    animation: pulse 4s infinite alternate ease-in-out;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; filter: hue-rotate(0deg); }
    100% { transform: scale(1.15); opacity: 1; filter: hue-rotate(90deg); }
  }

  .orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  .word {
    position: absolute;
    white-space: nowrap;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 0 8px currentColor, 0 0 20px currentColor;
    animation-duration: 6s;
    animation-direction: alternate;
    animation-iteration-count: infinite;
  }

  /* Orbit 1 */
  .o1 {
    width: 300px; height: 300px;
    margin-left: -150px; margin-top: -150px;
    animation-name: spin-cw;
    animation-duration: 12s;
  }
  .w1 { color: #ff0055; transform-origin: -30px 50%; animation: wobble1 3s ease-in-out infinite; }
  .w1 span { display: block; transform: rotate(0deg); }

  /* Orbit 2 */
  .o2 {
    width: 450px; height: 450px;
    margin-left: -225px; margin-top: -225px;
    animation-name: spin-ccw;
    animation-duration: 18s;
  }
  .w2 { color: #00ffff; transform-origin: -45px 50%; animation: wobble2 4s ease-in-out infinite; }
  .w2 span { display: block; transform: rotate(72deg); }

  /* Orbit 3 */
  .o3 {
    width: 600px; height: 600px;
    margin-left: -300px; margin-top: -300px;
    animation-name: spin-cw;
    animation-duration: 25s;
  }
  .w3 { color: #ccff00; transform-origin: -55px 50%; animation: wobble3 5s ease-in-out infinite; }
  .w3 span { display: block; transform: rotate(144deg); }

  /* Orbit 4 */
  .o4 {
    width: 750px; height: 750px;
    margin-left: -375px; margin-top: -375px;
    animation-name: spin-ccw;
    animation-duration: 35s;
  }
  .w4 { color: #bd00ff; transform-origin: -65px 50%; animation: wobble4 7s ease-in-out infinite; }
  .w4 span { display: block; transform: rotate(216deg); }

  @keyframes spin-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spin-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

  @keyframes wobble1 { 0%, 100% { transform: scale(1) skewX(0deg); } 50% { transform: scale(1.2) skewX(-10deg); } }
  @keyframes wobble2 { 0%, 100% { transform: scale(1) skewY(0deg); } 50% { transform: scale(1.3) skewY(10deg); } }
  @keyframes wobble3 { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(5deg); } }
  @keyframes wobble4 { 0%, 100% { transform: scale(1) translateX(0); } 50% { transform: scale(1.2) translateX(10px); } }

</style>
</head>
<body>

<div class="scene">
  <div class="threshold"></div>

  <!-- Ring 1 -->
  <div class="orbit o1">
    <div class="word w1"><span>Velocity</span></div>
  </div>

  <!-- Ring 2 -->
  <div class="orbit o2">
    <div class="word w2"><span>Threshold</span></div>
  </div>

  <!-- Ring 3 -->
  <div class="orbit o3">
    <div class="word w3"><span>Luminous</span></div>
  </div>

  <!-- Ring 4 -->
  <div class="orbit o4">
    <div class="word w4"><span>Orbiting</span></div>
  </div>
</div>





</body>
</html>
