<!DOCTYPE html>
html
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ambient Synth</title>
<style>
  body { margin: 0; background: #0a0a0f; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; color: #fff; }
  #start-btn { padding: 20px 40px; font-size: 18px; cursor: pointer; border: 1px solid #555; background: transparent; color: #aaa; border-radius: 4px; transition: all 0.3s ease; }
  #start-btn:hover { background: #222; color: #fff; border-color: #888; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
</style>
</head>
<body>

<button id="start-btn">Initialize Audio</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
const btn = document.getElementById('start-btn');
btn.addEventListener('click', async () => {
  await Tone.start();
  btn.style.display = 'none';

  // Setup Transport
  Tone.Transport.bpm.value = 84;

  // Effects Chain
  const reverb = new Tone.Reverb({ decay: 10, wet: 0.7 }).toDestination();
  const delay = new Tone.FeedbackDelay({ delayTime: "8n.", feedback: 0.3, wet: 0.2 }).connect(reverb);

  // Synths
  const pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "fatsine", count: 3, spread: 20 },
    envelope: { attack: 2, decay: 0.5, sustain: 0.7, release: 4 }
  }).connect(delay);

  const drone = new Tone.Synth({
    oscillator: { type: "sawtooth" },
    envelope: { attack: 5, decay: 0.1, sustain: 1, release: 5 }
  }).connect(delay);

  // Ambient Loop
  const loop = new Tone.Loop(time => {
    const chords = [
      ["C2", "G2", "E3"],
      ["A1", "E2", "C3"],
      ["F1", "C2", "A2"],
      ["G1", "D2", "B2"]
    ];

    // Play random chord from set
    const chord = chords[Math.floor(Math.random() * chords.length)];
    pad.triggerAttackRelease(chord, "2n", time, 0.6);

    // Occasional high shimmer
    if (Math.random() > 0.7) {
       pad.triggerAttackRelease(["E5", "G5", "B5"], "4n", time + Tone.Time("4n").toSeconds(), 0.15);
    }
  }, "1m");

  // Start Drone
  drone.triggerAttack("C1");

  // Start Sequence
  loop.start(0);
  Tone.Transport.start();
});
</script>
</body>
</html>
