name: Blacksmith Probe

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  probe:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Self-hosted runner probe
        run: |
          echo "Self-hosted runner probe"
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
