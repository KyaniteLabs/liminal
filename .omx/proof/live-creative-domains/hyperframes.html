<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperFrames Promo Composition</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0f;
            --accent-primary: #00f0ff;
            --accent-secondary: #ff0055;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #stage {
            position: relative;
            width: 1280px;
            height: 720px;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .clip {
            position: absolute;
            will-change: transform, opacity;
        }

        /* Title Card Styles */
        #title-card {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            opacity: 0;
        }

        #main-title {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            color: transparent;
            -webkit-text-stroke: 2px var(--accent-primary);
            text-transform: uppercase;
        }

        #sub-title {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 12px;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Background Grid / Shape */
        #bg-grid {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: scale(1.5);
            opacity: 0;
        }

        /* Hero Visual Element (Abstract Shape) */
        #hero-shape {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 600px;
            height: 600px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background: conic-gradient(from 180deg at 50% 50%, var(--accent-secondary), var(--accent-primary), var(--bg-color));
            filter: blur(40px);
            z-index: 1;
            mix-blend-mode: screen;
        }

        /* Feature List */
        #feature-list {
            bottom: 10%;
            left: 10%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 11;
            opacity: 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            font-size: 18px;
            font-weight: 500;
            transform: translateX(-50px);
            opacity: 0;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: var(--accent-primary);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        /* CTA Button Area */
        #cta-area {
            bottom: 15%;
            right: 10%;
            z-index: 12;
            opacity: 0;
        }

        .btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: color 0.4s;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--accent-primary);
            transition: left 0.4s;
            z-index: -1;
        }

    </style>
</head>
<body>

<div id="stage" data-composition-id="hyperframes-promo">

    <!-- Track 0: Background Elements -->
    <div id="bg-grid" class="clip" data-start="0" data-duration="12" data-track-index="0"></div>
    <div id="hero-shape" class="clip" data-start="1" data-duration="10" data-track-index="0"></div>

    <!-- Track 1: Typography & Titles -->
    <div id="title-card" class="clip" data-start="2" data-duration="6" data-track-index="1">
        <h1 id="main-title">HyperFrames</h1>
        <p id="sub-title">Motion Engine v2.0</p>
    </div>

    <!-- Track 2: Informational Content -->
    <div id="feature-list" class="clip" data-start="4" data-duration="7" data-track-index="2">
        <div class="feature-item">
            <div class="feature-icon"></div>
            <span>GSAP Timeline Integration</span>
        </div>
        <div class="feature-item">
            <div class="feature-icon"></div>
            <span>Staged Clip Architecture</span>
        </div>
        <div class="feature-item">
            <div class="feature-icon"></div>
            <span>Precision Timing Control</span>
        </div>
    </div>

    <!-- Track 3: Call to Action -->
    <div id="cta-area" class="clip" data-start="6" data-duration="5" data-track-index="3">
        <button class="btn">Launch Composition</button>
    </div>

</div>

<script>
    // Initialize the global timeline registry
    window.__timelines = window.__timelines || {};

    // Create the main timeline for this composition
    const tl = gsap.timeline({ paused: true });

    const compositionId = "hyperframes-promo";

    // --- Animation Sequence ---

    // 1. Background Grid Fade In
    tl.from("#bg-grid", {
        opacity: 0,
        duration: 1.5,
        ease: "power2.out"
    }, 0);

    // 2. Hero Shape Morph & Scale
    tl.to("#hero-shape", {
        scale: 1.2,
        rotation: 120,
        duration: 4,
        ease: "power3.inOut",
        repeat: 1,
        yoyo: true
    }, 1);

    // 3. Title Card Entrance
    tl.fromTo("#title-card",
        { opacity: 0, scale: 0.9, y: 30 },
        { opacity: 1, scale: 1, y: 0, duration: 1.2, ease: "back.out(1.7)" },
        2
    );

    // 4. Main Title Text Fill Effect
    tl.to("#main-title", {
        color: "#ffffff",
        duration: 1,
        ease: "power2.inOut"
    }, 2.5);

    // 5. Feature Items Staggered Entry
    tl.to(".feature-item", {
        x: 0,
        opacity: 1,
        stagger: 0.25,
        duration: 0.8,
        ease: "power3.out"
    }, 4);

    // 6. Feature List Container Fade
    tl.to("#feature-list", {
        opacity: 1,
        duration: 0.5
    }, 4);

    // 7. CTA Slide Up
    tl.fromTo("#cta-area",
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.8, ease: "circ.out" },
        6
    );

    // 8. Continuous Ambient Rotation for Hero Shape
    tl.to("#hero-shape", {
        rotation: "+=360",
        duration: 20,
        ease: "none",
        repeat: -1
    }, 0);

    // Register timeline globally
    window.__timelines[compositionId] = tl;

    // Optional: Auto-play for preview purposes (comment out for production integration)
    // tl.play();

</script>
</body>
</html>
