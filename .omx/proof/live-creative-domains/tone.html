<!DOCTYPE html>
html
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ambient Synth</title>
<style>
  body { margin: 0; background: #0a0a0f; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; color: #fff; }
  #btn { padding: 20px 40px; border: none; border-radius: 50px; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; font-size: 18px; cursor: pointer; box-shadow: 0 0 30px rgba(42,82,152,0.4); transition: all 0.3s ease; }
  #btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(42,82,152,0.7); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
<button id="btn">Start Ambient Loop</button>
<script>
const btn = document.getElementById('btn');
let started = false;

btn.addEventListener('click', async () => {
  if (started) return;
  await Tone.start();
  started = true;

  Tone.Transport.bpm.value = 84;

  const reverb = new Tone.Reverb({ decay: 10, wet: 0.6 }).toDestination();
  const delay = new Tone.FeedbackDelay({ delayTime: '8n.', feedback: 0.3, wet: 0.3 }).connect(reverb);

  // Pad Synth
  const padSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'fatsine', count: 3, spread: 20 },
    envelope: { attack: 2, decay: 0.5, sustain: 0.9, release: 4 }
  }).connect(delay);

  // Drone
  const drone = new Tone.Oscillator({
    type: 'sawtooth',
    frequency: 'C2',
    volume: -15
  }).connect(reverb);

  const droneFilter = new Tone.Filter({ frequency: 400, Q: 1, type: 'lowpass' });
  drone.connect(droneFilter);
  droneFilter.connect(delay);

  // Arp
  const arpSynth = new Tone.FMSynth({
    harmonicity: 3,
    modulationIndex: 10,
    oscillator: { type: 'sine' },
    envelope: { attack: 0.01, decay: 0.4, sustain: 0.1, release: 1 }
  }).connect(reverb);

  // Sequences
  const chordLoop = new Tone.Loop(time => {
    const chords = ['C4', 'G4', 'E4', 'B4'];
    padSynth.triggerAttackRelease(chords, '1m', time);
  }, '2m').start(0);

  const arpLoop = new Tone.Loop(time => {
    const notes = ['C5', 'E5', 'G5', 'B5', 'D5', 'F5', 'A5', 'C6'];
    const note = notes[Math.floor(Math.random() * notes.length)];
    arpSynth.triggerAttackRelease(note, '16n', time, Math.random() * 0.5 + 0.5);
  }, '16n').start(0);

  // Start Audio
  drone.start();
  Tone.Transport.start();

  btn.innerText = 'Ambient Active';
  btn.style.background = '#222';
});
</script>
</body>
</html>
