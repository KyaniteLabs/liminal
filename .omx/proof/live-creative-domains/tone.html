<!DOCTYPE html>
html
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ambient Synth</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0a0a0f; color: #fff; font-family: sans-serif; overflow: hidden; }
  button { padding: 20px 40px; font-size: 1.2rem; background: transparent; border: 1px solid #555; color: #aaa; cursor: pointer; transition: all 0.3s ease; border-radius: 4px; letter-spacing: 2px; text-transform: uppercase; }
  button:hover { border-color: #fff; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
</style>
</head>
<body>
<button id="start">Initialize Audio</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
document.getElementById('start').addEventListener('click', async () => {
  await Tone.start();
  document.body.innerHTML = '<div style="opacity:0.5;">Ambient Active</div>';

  Tone.Transport.bpm.value = 84;

  const reverb = new Tone.Reverb({ decay: 10, wet: 0.7 }).toDestination();
  const delay = new Tone.FeedbackDelay("8n", 0.4).connect(reverb);

  // Ambient Drone (Pad)
  const drone = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "fatsine", count: 3, spread: 20 },
    envelope: { attack: 2, decay: 0.1, sustain: 1, release: 4 },
    volume: -12
  }).connect(delay);

  // Melodic Sequence
  const synth = new Tone.FMSynth({
    harmonicity: 3,
    modulationIndex: 10,
    oscillator: { type: "sine" },
    envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 1 },
    modulation: { type: "square" },
    modulationEnvelope: { attack: 0.5, decay: 0, sustain: 1, release: 0.5 },
    volume: -18
  }).connect(reverb);

  const notes = ["C2", "G2", "E2", "B2", "F#2", "D3", "A2", "C3"];

  // Loop for the melodic sequence
  const loop = new Tone.Loop(time => {
    const note = notes[Math.floor(Math.random() * notes.length)];
    synth.triggerAttackRelease(note + Math.floor(Math.random() * 4 * 12) / 12, "2n", time);
  }, "4n").start(0);

  // Sustained Drone Chord
  drone.triggerAttack(["C2", "G2", "E3"], Tone.now());

  Tone.Transport.start();
});
</script>
</body>
</html>
