name: Forgejo CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: liminal-forgejo-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: fast-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_AUTH_TOKEN: ""
      ANTHROPIC_BASE_URL: ""
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ""
      ANTHROPIC_DEFAULT_OPUS_MODEL: ""
      ANTHROPIC_DEFAULT_SONNET_MODEL: ""
      MINIMAX_API_KEY: ""
      OLLAMA_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Verify toolchain
        run: |
          echo "Node: $(node --version)"
          echo "pnpm: $(pnpm --version)"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile || true

      - name: Orphan source check
        run: pnpm check:orphans || true

      - name: Package script target check
        run: pnpm check:script-targets || true

      - name: Lint source
        run: pnpm lint || true

      - name: Build project
        run: pnpm build || true

      - name: Fast test suite
        run: pnpm test:ci:fast || true

      - name: Test quality check
        run: pnpm test:quality || true
