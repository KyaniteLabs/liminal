name: Documentation Validation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: liminal-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - name: Check Version Consistency
        run: node -e "const pkg = require('./package.json'); console.log('Package version:', pkg.version); console.log('OK');"
      - name: Check Documentation Links
        run: node scripts/ci/check-doc-links.mjs
