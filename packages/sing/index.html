<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sing</title>
  </head>
  <body>
    <canvas id="sing-canvas" aria-label="Sing visual instrument"></canvas>
    <section id="sing-panel" aria-label="Sing controls">
      <strong>Sing</strong>
      <span id="sing-status">loading instrument</span>
      <button id="sing-start" type="button">Start mic</button>
      <button id="sing-record" type="button" disabled>Record</button>
    </section>
    <section id="sing-teleprompter" aria-label="Phrase teleprompter">
      <p id="sing-phrase">blue ash</p>
      <div>
        <button id="sing-phrase-toggle" type="button">Hide</button>
        <button id="sing-phrase-more" type="button">More</button>
        <button id="sing-phrase-pin" type="button">Pin</button>
        <button id="sing-phrase-dismiss" type="button">Dismiss</button>
        <button id="sing-phrase-disable" type="button">Off</button>
      </div>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
