<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Threshold</title>
    <style>
        :root {
            --bg: #050508;
            --glow-core: #00f0ff;
            --glow-mid: #7b2dff;
            --glow-edge: #ff0055;
            --text-color: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .scene {
            position: relative;
            width: 800px;
            height: 600px;
            max-width: 100%;
            max-height: 100%;
        }

        /* Luminous Threshold Core */
        .threshold {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255, 255, 255, 1) 0%,
                var(--glow-core) 20%,
                transparent 70%
            );
            filter: blur(1px);
            animation: pulseCore 3s ease-in-out infinite;
        }

        .threshold::before {
            content: '';
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            background: radial-gradient(circle,
                var(--glow-mid) 0%,
                transparent 60%
            );
            opacity: 0.6;
            animation: pulseOuter 4s ease-in-out infinite reverse;
        }

        .threshold::after {
            content: '';
            position: absolute;
            inset: -80px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent,
                var(--glow-edge),
                transparent,
                var(--glow-core),
                transparent
            );
            animation: rotateThreshold 10s linear infinite;
            opacity: 0.5;
        }

        /* Orbital Rings */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            transform-origin: center center;
        }

        .orbit-1 {
            width: 280px;
            height: 280px;
            margin-left: -140px;
            margin-top: -140px;
            animation: orbitWobble 12s ease-in-out infinite;
        }

        .orbit-2 {
            width: 420px;
            height: 420px;
            margin-left: -210px;
            margin-top: -210px;
            animation: orbitWobble 15s ease-in-out infinite reverse;
            border-style: dashed;
        }

        .orbit-3 {
            width: 560px;
            height: 560px;
            margin-left: -280px;
            margin-top: -280px;
            animation: orbitWobble 18s ease-in-out infinite;
            border-width: 2px;
            border-color: rgba(123, 45, 255, 0.15);
        }

        /* Word Containers */
        .word-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        /* Orbit 1 Words */
        .wc-1a {
            animation: orbit1 8s linear infinite;
        }
        .wc-1b {
            animation: orbit1 8s linear infinite;
            animation-delay: -2s;
        }
        .wc-1c {
            animation: orbit1 8s linear infinite;
            animation-delay: -4s;
        }
        .wc-1d {
            animation: orbit1 8s linear infinite;
            animation-delay: -6s;
        }

        /* Orbit 2 Words */
        .wc-2a {
            animation: orbit2 14s linear infinite reverse;
        }
        .wc-2b {
            animation: orbit2 14s linear infinite reverse;
            animation-delay: -3.5s;
        }
        .wc-2c {
            animation: orbit2 14s linear infinite reverse;
            animation-delay: -7s;
        }
        .wc-2d {
            animation: orbit2 14s linear infinite reverse;
            animation-delay: -10.5s;
        }

        /* Orbit 3 Words */
        .wc-3a {
            animation: orbit3 22s linear infinite;
        }
        .wc-3b {
            animation: orbit3 22s linear infinite;
            animation-delay: -5.5s;
        }
        .wc-3c {
            animation: orbit3 22s linear infinite;
            animation-delay: -11s;
        }
        .wc-3d {
            animation: orbit3 22s linear infinite;
            animation-delay: -16.5s;
        }

        /* Word Styling */
        .word {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-color);
            white-space: nowrap;
            text-shadow: 0 0 20px currentColor;
            animation: wordGlow 2s ease-in-out infinite alternate;
            user-select: none;
        }

        .orbit-1 .word {
            color: var(--glow-core);
            font-size: 16px;
        }
        .orbit-2 .word {
            color: var(--glow-mid);
            font-size: 14px;
        }
        .orbit-3 .word {
            color: var(--glow-edge);
            font-size: 13px;
            letter-spacing: 4px;
        }

        /* Position words at radius */
        .wc-1a .word { transform: translate(140px, 0); }
        .wc-1b .word { transform: translate(-140px, 0); }
        .wc-1c .word { transform: translate(0, 140px); }
        .wc-1d .word { transform: translate(0, -140px); }

        .wc-2a .word { transform: translate(210px, 0); }
        .wc-2b .word { transform: translate(-210px, 0); }
        .wc-2c .word { transform: translate(0, 210px); }
        .wc-2d .word { transform: translate(0, -210px); }

        .wc-3a .word { transform: translate(280px, 0); }
        .wc-3b .word { transform: translate(-280px, 0); }
        .wc-3c .word { transform: translate(0, 280px); }
        .wc-3d .word { transform: translate(0, -280px); }

        /* Counter-rotation to keep words upright */
        .orbit-1 .word { animation: counterRotate1 8s linear infinite; }
        .orbit-2 .word { animation: counterRotate2 14s linear infinite reverse; }
        .orbit-3 .word { animation: counterRotate3 22s linear infinite; }

        .wc-1b .word { animation-delay: -2s; }
        .wc-1c .word { animation-delay: -4s; }
        .wc-1d .word { animation-delay: -6s; }

        .wc-2b .word { animation-delay: -3.5s; }
        .wc-2c .word { animation-delay: -7s; }
        .wc-2d .word { animation-delay: -10.5s; }

        .wc-3b .word { animation-delay: -5.5s; }
        .wc-3c .word { animation-delay: -11s; }
        .wc-3d .word { animation-delay: -16.5s; }

        /* SVG Background Elements */
        .svg-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            fill: white;
            opacity: 0;
            animation: particleFloat 6s ease-in-out infinite;
        }

        .particle:nth-child(odd) {
            animation-direction: reverse;
            animation-duration: 8s;
        }

        .particle:nth-child(3n) {
            fill: var(--glow-core);
            animation-duration: 5s;
        }

        /* Keyframes */
        @keyframes pulseCore {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0.9;
            }
        }

        @keyframes pulseOuter {
            0%, 100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.3;
            }
        }

        @keyframes rotateThreshold {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes orbitWobble {
            0%, 100% {
                border-radius: 50%;
                transform: rotate(0deg) scale(1);
            }
            25% {
                border-radius: 48% 52% 50% 50%;
            }
            50% {
                border-radius: 52% 48% 48% 52%;
                transform: rotate(180deg) scale(1.02);
            }
            75% {
                border-radius: 50% 50% 52% 48%;
            }
        }

        @keyframes orbit1 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes orbit2 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes orbit3 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes counterRotate1 {
            from { transform: translate(140px, 0) rotate(0deg); }
            to { transform: translate(140px, 0) rotate(-360deg); }
        }
        @keyframes counterRotate1b {
            from { transform: translate(-140px, 0) rotate(0deg); }
            to { transform: translate(-140px, 0) rotate(-360deg); }
        }
        @keyframes counterRotate1c {
            from { transform: translate(0, 140px) rotate(0deg); }
            to { transform: translate(0, 140px) rotate(-360deg); }
        }
        @keyframes counterRotate1d {
            from { transform: translate(0, -140px) rotate(0deg); }
            to { transform: translate(0, -140px) rotate(-360deg); }
        }

        @keyframes counterRotate2 {
            from { transform: translate(210px, 0) rotate(0deg); }
            to { transform: translate(210px, 0) rotate(360deg); }
        }
        @keyframes counterRotate2b {
            from { transform: translate(-210px, 0) rotate(0deg); }
            to { transform: translate(-210px, 0) rotate(360deg); }
        }
        @keyframes counterRotate2c {
            from { transform: translate(0, 210px) rotate(0deg); }
            to { transform: translate(0, 210px) rotate(360deg); }
        }
        @keyframes counterRotate2d {
            from { transform: translate(0, -210px) rotate(0deg); }
            to { transform: translate(0, -210px) rotate(360deg); }
        }

        @keyframes counterRotate3 {
            from { transform: translate(280px, 0) rotate(0deg); }
            to { transform: translate(280px, 0) rotate(-360deg); }
        }
        @keyframes counterRotate3b {
            from { transform: translate(-280px, 0) rotate(0deg); }
            to { transform: translate(-280px, 0) rotate(-360deg); }
        }
        @keyframes counterRotate3c {
            from { transform: translate(0, 280px) rotate(0deg); }
            to { transform: translate(0, 280px) rotate(-360deg); }
        }
        @keyframes counterRotate3d {
            from { transform: translate(0, -280px) rotate(0deg); }
            to { transform: translate(0, -280px) rotate(-360deg); }
        }

        @keyframes wordGlow {
            0% {
                text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
                opacity: 0.7;
            }
            100% {
                text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 0 60px currentColor;
                opacity: 1;
            }
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(1.5);
            }
        }

        /* Specific word animations for variety */
        .wc-1a .word { animation-name: counterRotate1, wordGlow; }
        .wc-1b .word { animation-name: counterRotate1b, wordGlow; animation-duration: 8s, 2.3s; }
        .wc-1c .word { animation-name: counterRotate1c, wordGlow; animation-duration: 8s, 1.8s; }
        .wc-1d .word { animation-name: counterRotate1d, wordGlow; animation-duration: 8s, 2.7s; }

        .wc-2a .word { animation-name: counterRotate2, wordGlow; }
        .wc-2b .word { animation-name: counterRotate2b, wordGlow; animation-duration: 14s, 2.1s; }
        .wc-2c .word { animation-name: counterRotate2c, wordGlow; animation-duration: 14s, 2.5s; }
        .wc-2d .word { animation-name: counterRotate2d, wordGlow; animation-duration: 14s, 1.9s; }

        .wc-3a .word { animation-name: counterRotate3, wordGlow; }
        .wc-3b .word { animation-name: counterRotate3b, wordGlow; animation-duration: 22s, 2.4s; }
        .wc-3c .word { animation-name: counterRotate3c, wordGlow; animation-duration: 22s, 2.0s; }
        .wc-3d .word { animation-name: counterRotate3d, wordGlow; animation-duration: 22s, 2.8s; }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <!-- SVG Particle Background -->
        <svg class="svg-bg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <defs>
                <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
                    <stop offset="0%" stop-color="#0a0a14"/>
                    <stop offset="100%" stop-color="#050508"/>
                </radialGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#bgGrad)"/>

            <!-- Floating Particles -->
            <circle class="particle" cx="150" cy="450" r="2" style="animation-delay: 0s"/>
            <circle class="particle" cx="250" cy="500" r="1.5" style="animation-delay: -1s"/>
            <circle class="particle" cx="350" cy="400" r="2.5" style="animation-delay: -2s"/>
            <circle class="particle" cx="450" cy="480" r="1" style="animation-delay: -3s"/>
            <circle class="particle" cx="550" cy="420" r="2" style="animation-delay: -4s"/>
            <circle class="particle" cx="650" cy="500" r="1.5" style="animation-delay: -5s"/>
            <circle class="particle" cx="200" cy="150" r="2" style="animation-delay: -0.5s"/>
            <circle class="particle" cx="300" cy="100" r="1" style="animation-delay: -1.5s"/>
            <circle class="particle" cx="500" cy="130" r="2" style="animation-delay: -2.5s"/>
            <circle class="particle" cx="600" cy="180" r="1.5" style="animation-delay: -3.5s"/>
            <circle class="particle" cx="700" cy="120" r="2" style="animation-delay: -4.5s"/>
            <circle class="particle" cx="100" cy="300" r="1" style="animation-delay: -0.8s"/>
            <circle class="particle" cx="720" cy="350" r="2" style="animation-delay: -1.8s"/>

            <!-- Subtle grid lines -->
            <g stroke="rgba(255,255,255,0.02)" stroke-width="1">
                <line x1="400" y1="0" x2="400" y2="600"/>
                <line x1="0" y1="300" x2="800" y2="300"/>
                <circle cx="400" cy="300" r="200" fill="none"/>
                <circle cx="400" cy="300" r="300" fill="none"/>
            </g>
        </svg>

        <!-- Luminous Threshold -->
        <div class="threshold"></div>

        <!-- Orbital Rings -->
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
        <div class="orbit orbit-3"></div>

        <!-- Orbit 1 Words (Inner) -->
        <div class="word-container wc-1a">
            <span class="word">LUMINOUS</span>
        </div>
        <div class="word-container wc-1b">
            <span class="word">THRESHOLD</span>
        </div>
        <div class="word-container wc-1c">
            <span class="word">KINETIC</span>
        </div>
        <div class="word-container wc-1d">
            <span class="word">PULSE</span>
        </div>

        <!-- Orbit 2 Words (Middle) -->
        <div class="word-container wc-2a">
            <span class="word">VELOCITY</span>
        </div>
        <div class="word-container wc-2b">
            <span class="word">FREQUENCY</span>
        </div>
        <div class="word-container wc-2c">
            <span class="word">AMPLITUDE</span>
        </div>
        <div class="word-container wc-2d">
            <span class="word">RESONANCE</span>
        </div>

        <!-- Orbit 3 Words (Outer) -->
        <div class="word-container wc-3a">
            <span class="word">INFINITE</span>
        </div>
        <div class="word-container wc-3b">
            <span class="word">ETERNAL</span>
        </div>
        <div class="word-container wc-3c">
            <span class="word">BEYOND</span>
        </div>
        <div class="word-container wc-3d">
            <span class="word">VOID</span>
        </div>
    </div>


</body>
</html>
