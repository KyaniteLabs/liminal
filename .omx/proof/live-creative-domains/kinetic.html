<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kinetic Typography</title>
    <style>
        :root {
            --bg: #050508;
            --glow: #00f3ff;
            --accent: #ff0055;
            --text: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .scene {
            position: relative;
            width: 100vmin;
            height: 100vmin;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Luminous Threshold */
        .threshold {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 0 60px var(--glow),
                inset 0 0 40px var(--glow),
                0 0 120px rgba(0, 243, 255, 0.4);
            animation: pulse-threshold 4s ease-in-out infinite alternate;
            z-index: 1;
        }

        @keyframes pulse-threshold {
            0% { transform: scale(1); opacity: 0.6; filter: blur(1px); }
            100% { transform: scale(1.15); opacity: 1; filter: blur(2px); }
        }

        /* Orbiting Words Base */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            z-index: 10;
        }

        /* Individual Orbits */
        .o1 {
            width: 300px; height: 300px; margin-left: -150px; margin-top: -150px;
            animation-name: spin; animation-duration: 12s;
        }
        .o2 {
            width: 450px; height: 450px; margin-left: -225px; margin-top: -225px;
            animation-name: spin-reverse; animation-duration: 18s;
        }
        .o3 {
            width: 600px; height: 600px; margin-left: -300px; margin-top: -300px;
            animation-name: spin; animation-duration: 25s;
        }
        .o4 {
            width: 750px; height: 750px; margin-left: -375px; margin-top: -375px;
            animation-name: spin-reverse; animation-duration: 35s;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* Word Styling & Kinetic Effects */
        .word {
            position: absolute;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            color: transparent;
            -webkit-text-stroke: 1px var(--text);
            filter: drop-shadow(0 0 5px currentColor);
            animation: word-fx 6s ease-in-out infinite alternate;
        }

        .w-glow { color: var(--glow); -webkit-text-stroke: 0; text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow); }
        .w-accent { color: var(--accent); -webkit-text-stroke: 0; text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }

        @keyframes word-fx {
            0% { transform: scale(0.9) translateY(0); opacity: 0.7; }
            100% { transform: scale(1.2) translateY(-5px); opacity: 1; filter: brightness(1.5) drop-shadow(0 0 15px white); }
        }

        /* Positioning words on the orbit edge */
        .t1 { top: 0; left: 50%; transform-origin: 0 150px; font-size: 24px; animation-delay: 0s; }
        .t2 { top: 50%; right: 0; transform-origin: -112.5px 0; font-size: 32px; animation-delay: -1s; }
        .t3 { bottom: 0; left: 50%; transform-origin: 0 -150px; font-size: 28px; animation-delay: -2s; }
        .t4 { top: 50%; left: 0; transform-origin: 187.5px 0; font-size: 22px; animation-delay: -3s; }

        .t5 { top: 0; left: 50%; transform-origin: 0 225px; font-size: 36px; animation-delay: -0.5s; }
        .t6 { bottom: 0; left: 50%; transform-origin: 0 -225px; font-size: 26px; animation-delay: -2.5s; }

        .t7 { top: 0; left: 50%; transform-origin: 0 300px; font-size: 42px; animation-delay: -1.5s; }
        .t8 { bottom: 0; left: 50%; transform-origin: 0 -300px; font-size: 30px; animation-delay: -3.5s; }

        .t9 { top: 0; left: 50%; transform-origin: 0 375px; font-size: 48px; animation-delay: -0.2s; }
        .t10 { bottom: 0; left: 50%; transform-origin: 0 -375px; font-size: 34px; animation-delay: -4.2s; }

    </style>
</head>
<body>

    <div class="scene">
        <!-- Luminous Core -->
        <div class="threshold"></div>

        <!-- Orbit 1 (Inner) -->
        <div class="orbit o1">
            <div class="word t1 w-glow">Kinetic</div>
            <div class="word t3 w-accent">Type</div>
        </div>

        <!-- Orbit 2 -->
        <div class="orbit o2">
            <div class="word t2 w-glow">Orbiting</div>
            <div class="word t6 w-accent">Motion</div>
        </div>

        <!-- Orbit 3 -->
        <div class="orbit o3">
            <div class="word t7 w-accent">Luminous</div>
            <div class="word t8 w-glow">Threshold</div>
        </div>

        <!-- Orbit 4 (Outer) -->
        <div class="orbit o4">
            <div class="word t9 w-glow">Velocity</div>
            <div class="word t10 w-accent">Design</div>
        </div>
    </div>





</body>
</html>
