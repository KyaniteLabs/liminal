<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Typography Orbit</title>
    <style>
        :root {
            --bg: #050508;
            --glow: #00f3ff;
            --accent: #ff0055;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1200px;
        }

        /* The Luminous Threshold (Center) */
        .threshold {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(0,243,255,0.4) 40%, transparent 70%);
            box-shadow:
                0 0 60px var(--glow),
                0 0 120px var(--glow),
                inset 0 0 30px rgba(255,255,255,0.5);
            z-index: 10;
            animation: pulse-core 4s infinite ease-in-out alternate;
        }

        /* Base Word Styling */
        .word {
            position: absolute;
            top: 50%;
            left: 50%;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
            transform-origin: center center;
            pointer-events: none;
            text-shadow: 0 0 10px currentColor;
        }

        /* Orbital Paths & Animations */

        /* Orbit 1 */
        .orbit-1 {
            font-size: 2.5rem;
            color: var(--glow);
            animation: orbit-1-spin 12s linear infinite;
        }
        @keyframes orbit-1-spin {
            from { transform: rotate(0deg) translateX(220px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(220px) rotate(-360deg); }
        }

        /* Orbit 2 */
        .orbit-2 {
            font-size: 1.8rem;
            color: var(--accent);
            animation: orbit-2-spin 18s linear infinite reverse;
        }
        @keyframes orbit-2-spin {
            from { transform: rotate(45deg) translateX(320px) rotate(-45deg); }
            to { transform: rotate(-315deg) translateX(320px) rotate(315deg); }
        }

        /* Orbit 3 */
        .orbit-3 {
            font-size: 3rem;
            color: #fff;
            animation: orbit-3-spin 25s linear infinite;
        }
        @keyframes orbit-3-spin {
            from { transform: rotate(90deg) translateX(420px) rotate(-90deg); }
            to { transform: rotate(450deg) translateX(420px) rotate(-450deg); }
        }

        /* Orbit 4 (Tilted) */
        .orbit-4 {
            font-size: 1.4rem;
            color: #bd00ff;
            animation: orbit-4-spin 15s linear infinite;
        }
        @keyframes orbit-4-spin {
            0% { transform: rotateX(70deg) rotateZ(0deg) translateX(280px) rotateZ(0deg); }
            100% { transform: rotateX(70deg) rotateZ(360deg) translateX(280px) rotateZ(-360deg); }
        }

        /* Core Animation */
        @keyframes pulse-core {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; box-shadow: 0 0 40px var(--glow); }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; box-shadow: 0 0 80px var(--glow), 0 0 150px var(--accent); }
        }

        /* Kinetic Text Effects */
        .wobble { animation: wobble-text 3s ease-in-out infinite alternate; }
        @keyframes wobble-text {
            0% { letter-spacing: 2px; transform: scale(1); }
            100% { letter-spacing: 10px; transform: scale(1.05); }
        }

        .blink { animation: blink-text 2s step-end infinite; }
        @keyframes blink-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .scale-pulse { animation: scale-pulse 4s ease-in-out infinite; }
        @keyframes scale-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .color-shift { animation: color-shift 6s linear infinite; }
        @keyframes color-shift {
            0% { color: var(--glow); text-shadow: 0 0 20px var(--glow); }
            33% { color: var(--accent); text-shadow: 0 0 20px var(--accent); }
            66% { color: #bd00ff; text-shadow: 0 0 20px #bd00ff; }
            100% { color: var(--glow); text-shadow: 0 0 20px var(--glow); }
        }

        .skew-dance { animation: skew-dance 5s ease-in-out infinite; }
        @keyframes skew-dance {
            0% { transform: skewX(-15deg); }
            50% { transform: skewX(15deg); }
            100% { transform: skewX(-15deg); }
        }

    </style>
</head>
<body>

    <div class="scene">
        <!-- Central Luminous Threshold -->
        <div class="threshold"></div>

        <!-- Orbiting Words -->
        <div class="word orbit-1 wobble">Kinetic</div>
        <div class="word orbit-2 blink">Threshold</div>
        <div class="word orbit-3 color-shift">Luminous</div>
        <div class="word orbit-4 scale-pulse">Orbiting</div>
        <div class="word orbit-1 skew-dance" style="animation-delay: -5s;">Typography</div>
        <div class="word orbit-2 color-shift" style="animation-delay: -9s;">Design</div>
        <div class="word orbit-3 wobble" style="animation-delay: -12s;">Motion</div>
        <div class="word orbit-4 blink" style="animation-delay: -2s;">Vector</div>
    </div>





</body>
</html>
