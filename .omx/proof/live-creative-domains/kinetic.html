<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kinetic Typography</title>
    <style>
        :root {
            --bg: #050508;
            --glow: #00f3ff;
            --accent: #ff0055;
            --text: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .scene {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Luminous Threshold */
        .threshold {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(0, 243, 255, 0.2);
            box-shadow:
                0 0 20px var(--glow),
                0 0 40px var(--glow),
                inset 0 0 20px var(--glow);
            animation: pulseThreshold 4s infinite alternate ease-in-out;
            z-index: 1;
        }

        @keyframes pulseThreshold {
            0% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 20px var(--glow); }
            100% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 50px var(--glow), 0 0 80px var(--accent); }
        }

        /* Orbiting Words Base */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center;
            pointer-events: none;
        }

        /* Word Styling */
        .word {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: transparent;
            -webkit-text-stroke: 1px var(--text);
            filter: drop-shadow(0 0 5px currentColor);
        }

        /* Orbit 1 */
        .o1 {
            width: 300px;
            height: 300px;
            margin-left: -150px;
            margin-top: -150px;
            animation: spin 12s linear infinite;
        }
        .w1 {
            top: -10px; left: 50%; margin-left: -30px;
            font-size: 18px;
            animation: flicker 3s infinite alternate;
            color: var(--glow);
        }

        /* Orbit 2 */
        .o2 {
            width: 420px;
            height: 420px;
            margin-left: -210px;
            margin-top: -210px;
            animation: spin 18s linear infinite reverse;
        }
        .w2 {
            bottom: 10px; left: 50%; margin-left: -45px;
            font-size: 24px;
            color: var(--accent);
            animation: pulseText 4s infinite ease-in-out;
        }

        /* Orbit 3 (Diagonal) */
        .o3 {
            width: 380px;
            height: 180px;
            margin-left: -190px;
            margin-top: -90px;
            transform: rotate(-30deg);
            animation: spin 9s linear infinite;
        }
        .w3 {
            right: -20px; top: 50%; margin-top: -10px;
            font-size: 14px;
            letter-spacing: 6px;
            color: #fff;
            animation: glitch 2s steps(2) infinite;
        }

        /* Orbit 4 (Vertical) */
        .o4 {
            width: 120px;
            height: 450px;
            margin-left: -60px;
            margin-top: -225px;
            transform: rotate(15deg);
            animation: spin 22s linear infinite reverse;
        }
        .w4 {
            bottom: 0; left: 0;
            font-size: 16px;
            writing-mode: vertical-rl;
            color: var(--glow);
            text-shadow: 0 0 10px var(--glow);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 7px var(--glow), 0 0 10px var(--glow);
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.4;
            }
        }

        @keyframes pulseText {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 20px var(--accent); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            25% { transform: translate(-2px, 2px); filter: hue-rotate(90deg); }
            50% { transform: translate(2px, -2px); filter: hue-rotate(180deg); }
            75% { transform: translate(-2px, -2px); filter: hue-rotate(270deg); }
            100% { transform: translate(0); filter: hue-rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="scene">
        <!-- Central Luminous Core -->
        <div class="threshold"></div>

        <!-- Orbital Paths & Text -->
        <div class="orbit o1">
            <span class="word w1">Velocity</span>
        </div>

        <div class="orbit o2">
            <span class="word w2">Threshold</span>
        </div>

        <div class="orbit o3">
            <span class="word w3">KINETIC</span>
        </div>

        <div class="orbit o4">
            <span class="word w4">LUMINOUS</span>
        </div>
    </div>





</body>
</html>
